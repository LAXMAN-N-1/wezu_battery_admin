server {
    listen 80;
    server_name _;

    # Docker internal DNS — required when using variables in proxy_pass
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml
               application/wasm font/woff2;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_buffers 16 8k;

    # ── Health check (no logging) ──
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'ok';
    }

    # ── index.html: never cache (ensures fresh deploys are picked up) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # ── Flutter bootstrap/service-worker: short cache ──
    location ~* ^/(flutter_bootstrap\.js|flutter_service_worker\.js|version\.json|manifest\.json)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # ── main.dart.js: content-hashed, long cache ──
    location ~* ^/main\.dart\.js$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── CanvasKit WASM + JS: long cache (versioned by Flutter) ──
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── Static assets: long cache ──
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ── Reverse-proxy API calls to the backend ──
    # This avoids CORS issues by making the browser see same-origin requests.
    # Traefik handles SSL termination; nginx proxies /api/ to the backend.
    location /api/ {
        # Use a variable so nginx resolves DNS at runtime, not just at startup
        set $backend "https://api1.powerfrill.com";
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host api1.powerfrill.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Trust Traefik's forwarded proto (it terminates SSL)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Timeouts matching Dio client settings
        proxy_connect_timeout 15s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Disable buffering for streaming/SSE if needed
        proxy_buffering off;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
